name: Claude Feature Implementation

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    name: Implement Feature from Issue
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude implement')

    steps:
      # step1： GitHub Actions change to the current branch environment
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 讀取所有分支紀錄
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Implement feature with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          claude_args: >
            --max-turns 30
            --model claude-3-5-sonnet
            --allowedTools Read,Write,Edit,Bash,Glob,Grep
            --no-pr
            --message "$CLAUDE_PROMPT"
        env:
          CLAUDE_PROMPT: "Please implement the feature requested in this GitHub issue comment: ${{ github.event.comment.body }}"

      # 💡 step2： GitHub CLI create PR 
      - name: Create Pull Request with GitHub CLI
        run: |
         
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          
          if ! git diff --quiet; then
            git commit -am "feat: AI automated implementation for Issue #${{ github.event.issue.number }}"
            git push origin HEAD
            
           
            gh pr create \
              --title "Claude: ${{ github.event.issue.title }}" \
              --body "This PR is automatically generated by Claude to resolve #${{ github.event.issue.number }}." \
              --base main \
              --head $(git branch --show-current)
          else
            echo "No changes detected, skipping PR creation."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}