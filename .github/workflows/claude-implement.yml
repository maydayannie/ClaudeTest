name: Claude Feature Implementation

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    name: Implement Feature from Issue
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@claude implement')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Implement feature with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "Please implement the feature requested in this GitHub issue comment: ${{ github.event.comment.body }}"
          allowed_tools: "Read,Write,Edit,Bash,Glob,Grep"
          claude_args: "--max-turns 30 --model claude-sonnet-4-6"

      - name: Create Pull Request
        if: steps.claude.outputs.branch_name != ''
        run: |
          gh pr create \
            --title "Claude: ${{ github.event.issue.title }}" \
            --body "Implements changes requested in #${{ github.event.issue.number }}

          Resolves #${{ github.event.issue.number }}" \
            --base main \
            --head "${{ steps.claude.outputs.branch_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}